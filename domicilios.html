<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
:root{
  --rappi:#FF441A;--rappi-dark:#E03310;--rappi-soft:rgba(255,68,26,.10);
  --rojo:#E53935;--verde-ok:#00C853;
  --negro:#1A1A1A;--gris-osc:#555;--gris:#888;--gris-cl:#F0F0F0;
  --fondo:#F5F5F5;--blanco:#FFF;--borde:#E0E0E0;
  --sombra-s:0 2px 8px rgba(0,0,0,.10);--sombra-m:0 4px 16px rgba(0,0,0,.14);
  --r-sm:10px;--r:16px;--r-lg:20px;
  --font:'Inter',sans-serif;--font-num:'DM Mono',monospace;
}
body{font-family:var(--font);background:var(--fondo);color:var(--negro);min-height:100dvh;overflow-x:hidden;}

/* Header */
.hdr{background:var(--rappi);padding:14px 16px 10px;display:flex;align-items:center;gap:12px;
  position:sticky;top:0;z-index:200;box-shadow:0 2px 12px rgba(255,68,26,.4);}
.hdr-title{font-size:18px;font-weight:800;color:#fff;flex:1;}
.hdr-badge{background:#fff;color:var(--rappi);border-radius:50%;min-width:24px;height:24px;
  display:inline-flex;align-items:center;justify-content:center;font-size:12px;font-weight:900;margin-left:6px;}
.hdr-link{font-size:12px;color:rgba(255,255,255,.75);font-weight:700;text-decoration:none;
  padding:7px 12px;border:1.5px solid rgba(255,255,255,.4);border-radius:999px;}

/* Panel */
#panelBody{padding:14px 14px 80px;}

/* Dom cards — mismos estilos que index */
.dom-card{background:var(--blanco);border:1.5px solid var(--borde);border-radius:var(--r);
  margin-bottom:12px;overflow:hidden;box-shadow:var(--sombra-s);transition:border-color .2s;}
.dom-card.estado-pendiente   {border-left:4px solid #FF9800;}
.dom-card.estado-verificando {border-left:4px solid #1976D2;}
.dom-card.estado-confirmado  {border-left:4px solid #7B1FA2;}
.dom-card.estado-pago_pendiente{border-left:4px solid #E65100;background:rgba(230,81,0,.05);}
.dom-card.estado-pago_revisando{border-left:4px solid #1565C0;background:rgba(21,101,192,.04);}
.dom-card.estado-pago_rechazado{border-left:4px solid #E53935;background:rgba(229,57,53,.04);}
.dom-card.estado-cocina      {border-left:4px solid #FF9800;}
.dom-card.estado-listo       {border-left:4px solid #00C853;}
.dom-card.estado-despachado  {border-left:4px solid var(--rappi);}
.dom-card.estado-entregado   {border-left:4px solid #00C853;opacity:.75;}
.dom-card.estado-cancelado   {border-left:4px solid var(--gris);opacity:.6;}
.dom-card-header{padding:12px 14px 8px;display:flex;align-items:flex-start;gap:10px;}
.dom-card-titulo{flex:1;min-width:0;}
.dom-card-nombre{font-size:16px;font-weight:800;color:var(--negro);display:flex;align-items:center;gap:0;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.dom-card-meta{font-size:11px;color:var(--gris);margin-top:2px;font-weight:500;}
.dom-estado-badge{flex-shrink:0;font-size:11px;font-weight:800;padding:4px 10px;border-radius:20px;white-space:nowrap;}
.dom-estado-badge.pendiente  {background:rgba(255,152,0,.12);color:#E65100;}
.dom-estado-badge.verificando{background:rgba(25,118,210,.10);color:#1565C0;}
.dom-estado-badge.confirmado {background:rgba(123,31,162,.10);color:#6A1B9A;}
.dom-estado-badge.cocina     {background:rgba(255,152,0,.12);color:#E65100;}
.dom-estado-badge.listo      {background:rgba(0,200,83,.10);color:#1B5E20;}
.dom-estado-badge.despachado {background:rgba(255,68,26,.12);color:var(--rappi-dark);}
.dom-estado-badge.entregado  {background:rgba(0,200,83,.10);color:#1B5E20;}
.dom-estado-badge.cancelado  {background:var(--gris-cl);color:var(--gris);}
.dom-card-items{padding:0 14px 8px;font-size:13px;color:var(--gris-osc);line-height:1.6;}
.dom-card-item-row{display:flex;justify-content:space-between;align-items:center;padding:3px 0;border-bottom:1px solid var(--gris-cl);}
.dom-card-item-row:last-child{border-bottom:none;}
.dom-card-last-msg{padding:6px 14px 8px;font-size:12px;color:var(--gris-osc);border-top:1px solid var(--gris-cl);
  display:flex;align-items:center;gap:6px;line-height:1.4;}
.dom-card-last-msg .lm-autor{font-weight:800;color:var(--gris);flex-shrink:0;font-size:11px;}
.dom-card-last-msg .lm-txt{flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.dom-card-last-msg.has-unread .lm-txt{font-weight:800;color:var(--negro);}
.dom-card-eta{padding:5px 14px;font-size:12px;font-weight:800;color:#0D47A1;
  background:rgba(21,101,192,.07);display:flex;align-items:center;gap:6px;}
.dom-card-footer{background:rgba(0,0,0,.03);border-top:1px solid var(--gris-cl);
  padding:10px 14px;display:flex;align-items:center;justify-content:space-between;gap:8px;flex-wrap:wrap;}
.dom-card-total{font-size:18px;font-weight:900;color:var(--rappi);font-family:var(--font-num);}
.dom-btns{display:flex;gap:6px;flex-wrap:wrap;justify-content:flex-end;}
.dom-btn{padding:8px 14px;border:none;border-radius:10px;font-size:12px;font-weight:800;cursor:pointer;font-family:inherit;
  white-space:nowrap;transition:opacity .15s,transform .1s;}
.dom-btn:active{transform:scale(.96);}
.dom-btn.primary{background:var(--rappi);color:#111;}
.dom-btn.secondary{background:var(--gris-cl);color:var(--gris-osc);}
.dom-btn.danger{background:#E53935;color:#fff;}
.dom-btn.green{background:#2E7D32;color:#fff;}
.dom-btn.blue{background:#1565C0;color:#fff;}
.dom-btn.whatsapp{background:#25D366;color:#fff;font-size:14px;padding:8px 10px;}
.dom-msg-badge{display:inline-flex;align-items:center;justify-content:center;
  background:#E53935;color:#fff;border-radius:50%;min-width:20px;height:20px;font-size:11px;font-weight:900;
  margin-left:6px;flex-shrink:0;}
.dom-item-badge-nostock{font-size:10px;background:#E53935;color:#fff;border-radius:20px;padding:1px 7px;font-weight:700;margin-left:6px;}
.dom-item-precio{font-size:12px;font-weight:700;color:var(--rappi);font-family:var(--font-num);}
.dom-item-nombre{font-weight:600;color:var(--negro);font-size:13px;}

/* Modal */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:500;
  align-items:flex-end;justify-content:center;}
.modal-overlay.show{display:flex;}
.modal{background:var(--blanco);border-radius:var(--r-lg) var(--r-lg) 0 0;
  padding:20px 16px 32px;width:100%;max-width:600px;max-height:92dvh;overflow-y:auto;}
.modal-handle{width:36px;height:4px;background:var(--borde);border-radius:2px;
  margin:0 auto 16px;cursor:pointer;}
.modal h3{font-size:17px;font-weight:800;color:var(--negro);margin-bottom:14px;}
.btn-modal-close{display:block;width:100%;padding:13px;background:var(--gris-cl);color:var(--negro);
  border:none;border-radius:var(--r-sm);font-size:15px;font-weight:700;font-family:inherit;cursor:pointer;margin-top:12px;}

/* Toast */
#toastWrap{position:fixed;top:16px;left:50%;transform:translateX(-50%);z-index:9999;
  display:flex;flex-direction:column;gap:8px;pointer-events:none;min-width:220px;max-width:340px;}
.toast{background:#222;color:#fff;border-radius:999px;padding:10px 20px;font-size:13px;font-weight:700;
  text-align:center;box-shadow:var(--sombra-m);animation:toastIn .3s ease;}
@keyframes toastIn{from{opacity:0;transform:translateY(-8px);}to{opacity:1;transform:translateY(0);}}

/* Empty */
.dom-empty{text-align:center;padding:50px 20px;}
.dom-empty .icon{font-size:52px;margin-bottom:12px;opacity:.35;}
.dom-empty p{font-size:14px;font-weight:600;color:var(--gris);}

/* Loader */
#loader{position:fixed;inset:0;z-index:9999;display:flex;flex-direction:column;
  align-items:center;justify-content:center;gap:12px;background:var(--fondo);transition:opacity .4s;}
#loader.out{opacity:0;pointer-events:none;}
.spin{width:40px;height:40px;border:3px solid var(--borde);border-top-color:var(--rappi);
  border-radius:50%;animation:spin .7s linear infinite;}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>

<div id="loader"><div class="spin"></div><p style="font-size:13px;font-weight:700;color:var(--gris);">Cargando…</p></div>

<div class="hdr">
  <div class="hdr-title">🛵 Domicilios <span class="hdr-badge" id="hdrBadge" style="display:none;">0</span></div>
  <a href="index.html" class="hdr-link">← POS</a>
</div>

<div id="panelBody"></div>

<!-- Modal detalle -->
<div class="modal-overlay" id="modalDetalle">
  <div class="modal">
    <div class="modal-handle" onclick="cerrarModal()"></div>
    <div id="modalContenido"></div>
    <button class="btn-modal-close" onclick="cerrarModal()">Cerrar</button>
  </div>
</div>

<div id="toastWrap"></div>

<script>
'use strict';

const DOM_PATH = 'restaurante/domicilios';
let _pedidos = [];
let _unsub   = null;
let _actualId = null;
let _msgCounts = new Map();

const ESTADOS_LABEL = {
  pendiente:'🕐 Pendiente',verificando:'🔍 Verificando',confirmado:'✅ Confirmado',
  esperando_pago:'💳 Esperando pago',comprobante_enviado:'📎 Comprobante enviado',
  pago_pendiente:'💳 Pago por confirmar',pago_revisando:'🔍 Revisando',pago_rechazado:'❌ Comp. rechazado',
  pago:'💳 Esperando pago',cocina:'🍳 En cocina',listo:'📦 Listo',despachado:'🛵 En camino',
  entregado:'🏠 Entregado',cancelado:'❌ Cancelado',no_disponible:'⚠️ Sin disponibilidad',
};

function fmt(n){ return '$ '+Number(n||0).toLocaleString('es-CO'); }
function esc(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;'); }

function showToast(msg,dur=3200){
  const w=document.getElementById('toastWrap');
  const t=document.createElement('div');
  t.className='toast';t.textContent=msg;
  w.appendChild(t);
  setTimeout(()=>{t.style.opacity='0';t.style.transition='opacity .4s';setTimeout(()=>t.remove(),400);},dur);
}

function beepMensaje(){
  try{
    const ctx=new(window.AudioContext||window.webkitAudioContext)();
    const osc=ctx.createOscillator(),gain=ctx.createGain();
    osc.connect(gain);gain.connect(ctx.destination);
    osc.frequency.value=660;osc.type='sine';
    gain.gain.setValueAtTime(0.12,ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+0.28);
    osc.start(ctx.currentTime);osc.stop(ctx.currentTime+0.28);
  }catch(_){}
}

function beepNuevoPedido(){
  try{
    const ctx=new(window.AudioContext||window.webkitAudioContext)();
    [880,880,1100].forEach((freq,i)=>{
      const osc=ctx.createOscillator(),gain=ctx.createGain();
      osc.connect(gain);gain.connect(ctx.destination);
      osc.frequency.value=freq;osc.type='square';
      gain.gain.setValueAtTime(0.18,ctx.currentTime+i*0.22);
      gain.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+i*0.22+0.18);
      osc.start(ctx.currentTime+i*0.22);osc.stop(ctx.currentTime+i*0.22+0.18);
    });
  }catch(_){}
}

function arrancar(){
  if(!window._FB||!window._FB.db){
    window.addEventListener('firebase-ready',arrancar,{once:true});
    return;
  }
  if(_unsub) _unsub();
  const seenIds=new Set();
  let primerCarga=true;
  const r=window._FB.ref(window._FB.db,DOM_PATH);
  _unsub=window._FB.onValue(r,snap=>{
    const val=snap.val();
    if(!val||typeof val!=='object'){_pedidos=[];}
    else{
      _pedidos=Object.entries(val)
        .map(([k,v])=>({...v,_fbKey:k}))
        .filter(Boolean)
        .sort((a,b)=>(b.timestamp||0)-(a.timestamp||0));
    }
    if(primerCarga){
      primerCarga=false;
      _pedidos.forEach(p=>{ if(p.sessionId) seenIds.add(p.sessionId); });
    } else {
      _pedidos.forEach(p=>{
        if(!p.sessionId) return;
        if(!seenIds.has(p.sessionId)&&p.estado==='pendiente'){
          seenIds.add(p.sessionId);
          beepNuevoPedido();
          showToast('🛵 Nuevo pedido de '+(p.clienteNombre||'Cliente'),6000);
        } else {
          const prev=_msgCounts.get(p.sessionId)||0;
          const msgs=Array.isArray(p.mensajes)?p.mensajes:[];
          const count=msgs.filter(m=>m.autor==='cliente').length;
          if(count>prev) beepMensaje();
          _msgCounts.set(p.sessionId,count);
          seenIds.add(p.sessionId);
        }
      });
    }
    renderPanel();
    actualizarBadge();
    if(_actualId){
      const p=_pedidos.find(x=>x.sessionId===_actualId);
      if(p&&document.getElementById('modalDetalle').classList.contains('show')) renderModal(p);
    }
    document.getElementById('loader').classList.add('out');
  },err=>console.warn('FB error:',err));
}

function actualizarBadge(){
  const n=_pedidos.filter(p=>p.estado&&!['despachado','entregado','cancelado'].includes(p.estado)).length;
  const b=document.getElementById('hdrBadge');
  if(b){b.textContent=n;b.style.display=n>0?'inline-flex':'none';}
}

function renderPanel(){
  const wrap=document.getElementById('panelBody');
  if(!wrap) return;
  if(_pedidos.length===0){
    wrap.innerHTML=`<div class="dom-empty"><div class="icon">🛵</div><p>Sin pedidos de domicilio</p><p style="font-size:12px;color:var(--gris);margin-top:6px;">Los pedidos aparecerán aquí en tiempo real</p></div>`;
    return;
  }
  wrap.innerHTML=_pedidos.map(p=>renderCard(p)).join('');
}

function renderCard(p){
  const estado=p.estado||'pendiente';
  const label=ESTADOS_LABEL[estado]||estado;
  const total=(p.items||[]).reduce((s,i)=>s+(i.precio||0)*(i.cantidad||1),0)+(p.costoEnvio||0);
  const hora=p.timestamp?new Date(p.timestamp).toLocaleTimeString('es-CO',{hour:'2-digit',minute:'2-digit'}):'';
  const msgs=Array.isArray(p.mensajes)?p.mensajes:[];
  const unread=msgs.filter(m=>m.autor==='cliente'&&(m.ts||0)>(p.adminReadTs||0)).length;
  const badge=unread>0?`<span class="dom-msg-badge">${unread}</span>`:'';
  const lm=msgs.filter(m=>m.tipo!=='sistema').slice(-1)[0];
  const lastMsgHtml=lm?`<div class="dom-card-last-msg${unread>0&&lm.autor==='cliente'?' has-unread':''}">
    <span class="lm-autor">${esc(lm.autor==='admin'?'Tú':(p.clienteNombre||'Cliente').split(' ')[0])}:</span>
    <span class="lm-txt">${esc(lm.texto)}</span></div>`:'';
  let etaHtml='';
  if(p.etaMin&&p.etaTs){
    const rem=Math.max(0,Math.round((p.etaTs+p.etaMin*60000-Date.now())/60000));
    if(rem>0) etaHtml=`<div class="dom-card-eta">⏱️ <b>${rem} min restantes</b></div>`;
  }
  const items=(p.items||[]).slice(0,3).map(i=>{
    const ns=(p.sinStock||[]).includes(i.nombre);
    return `<div class="dom-card-item-row"><span class="dom-item-nombre">${esc(i.nombre)}${ns?'<span class="dom-item-badge-nostock">Sin stock</span>':''}</span><span class="dom-item-precio">${i.cantidad}× ${fmt(i.precio)}</span></div>`;
  }).join('');
  const mas=(p.items||[]).length>3?`<div style="font-size:11px;color:var(--gris);padding:3px 0;">+${(p.items||[]).length-3} más…</div>`:'';
  const waBtn=p.clienteTelefono?`<button class="dom-btn whatsapp" onclick="event.stopPropagation();window.open('https://wa.me/57${String(p.clienteTelefono).replace(/\D/g,'')}','_blank')" title="WhatsApp">💬</button>`:'';
  return `<div class="dom-card estado-${esc(estado)}" onclick="abrirDetalle('${esc(p.sessionId)}')">
    <div class="dom-card-header">
      <div class="dom-card-titulo">
        <div class="dom-card-nombre">${esc(p.clienteNombre||'Cliente')}${badge}</div>
        <div class="dom-card-meta">📞 ${esc(p.clienteTelefono||'—')} · ${hora}</div>
      </div>
      <span class="dom-estado-badge ${esc(estado)}">${esc(label)}</span>
    </div>
    ${etaHtml}
    <div class="dom-card-items">${items}${mas}</div>
    ${lastMsgHtml}
    <div class="dom-card-footer">
      <div class="dom-card-total">${fmt(total)}</div>
      <div class="dom-btns">${waBtn}<button class="dom-btn blue" onclick="event.stopPropagation();abrirDetalle('${esc(p.sessionId)}')">Ver detalle</button></div>
    </div>
  </div>`;
}

function abrirDetalle(sid){
  const p=_pedidos.find(x=>x.sessionId===sid);
  if(!p) return;
  _actualId=sid;
  if(window._FB) window._FB.update(window._FB.ref(window._FB.db,`${DOM_PATH}/${sid}`),{adminReadTs:Date.now()}).catch(()=>{});
  renderModal(p);
  document.getElementById('modalDetalle').classList.add('show');
}

function cerrarModal(){
  document.getElementById('modalDetalle').classList.remove('show');
  _actualId=null;
}

function renderModal(p){
  const el=document.getElementById('modalContenido');
  if(!el) return;
  const estado=p.estado||'pendiente';
  const total=(p.items||[]).reduce((s,i)=>s+(i.precio||0)*(i.cantidad||1),0)+(p.costoEnvio||0);
  const msgs=Array.isArray(p.mensajes)?p.mensajes:[];
  const chatHtml=msgs.map(m=>{
    if(m.tipo==='sistema') return `<div style="text-align:center;font-size:11px;font-weight:700;color:var(--gris);background:var(--gris-cl);border-radius:999px;padding:4px 12px;margin:4px auto;max-width:85%;">${esc(m.texto)}</div>`;
    const isClient=m.autor==='cliente';
    const hora2=m.ts?new Date(m.ts).toLocaleTimeString('es-CO',{hour:'2-digit',minute:'2-digit'}):'';
    return `<div style="display:flex;flex-direction:column;align-items:${isClient?'flex-start':'flex-end'};margin-bottom:6px;">
      <div style="max-width:82%;background:${isClient?'#EEF2FF':'var(--blanco)'};border:1.5px solid ${isClient?'#C7D2FE':'var(--borde)'};
        border-radius:${isClient?'4px 14px 14px 14px':'14px 4px 14px 14px'};padding:8px 12px;font-size:13px;font-weight:600;line-height:1.45;">${esc(m.texto)}</div>
      <div style="font-size:10px;color:var(--gris);margin-top:2px;font-family:var(--font-num);">${isClient?'Cliente':'Tú'} · ${hora2}</div>
    </div>`;
  }).join('');
  const waLink=p.clienteTelefono?`<a href="https://wa.me/57${String(p.clienteTelefono).replace(/\D/g,'')}" target="_blank"
    style="display:inline-flex;align-items:center;gap:5px;background:#25D366;color:#fff;border-radius:10px;
    padding:7px 14px;font-size:13px;font-weight:800;text-decoration:none;margin-bottom:10px;">💬 Abrir WhatsApp</a>`:'' ;
  el.innerHTML=`
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;">
      <div>
        <div style="font-size:17px;font-weight:800;">🛵 Domicilio</div>
        <div style="font-size:11px;color:var(--gris);margin-top:2px;">#${esc((p.sessionId||'').slice(-6).toUpperCase())}</div>
      </div>
      <span class="dom-estado-badge ${esc(estado)}">${esc(ESTADOS_LABEL[estado]||estado)}</span>
    </div>
    <div style="background:var(--gris-cl);border-radius:var(--r-sm);padding:10px 12px;margin-bottom:10px;font-size:13px;line-height:1.8;">
      <b>Cliente:</b> ${esc(p.clienteNombre||'—')}<br>
      <b>Teléfono:</b> ${esc(p.clienteTelefono||'—')}<br>
      <b>Dirección:</b> ${esc(p.clienteDireccion||'—')}<br>
      ${p.clienteNotas?`<b>Notas:</b> ${esc(p.clienteNotas)}<br>`:''}
      <b>Total:</b> <span style="color:var(--rappi);font-weight:900;">${fmt(total)}</span><br>
      <b>Pago:</b> ${esc(p.metodoPagoLabel||'—')}
    </div>
    ${waLink}
    <div style="margin-bottom:10px;">
      <div style="font-size:11px;font-weight:800;color:var(--gris);text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px;">💬 Chat</div>
      <div id="domModChatMsgs" style="background:var(--gris-cl);border-radius:var(--r-sm);padding:10px;min-height:60px;max-height:200px;overflow-y:auto;display:flex;flex-direction:column;gap:4px;margin-bottom:8px;">
        ${chatHtml||'<div style="text-align:center;color:var(--gris);font-size:12px;padding:8px;">Sin mensajes</div>'}
      </div>
      <div style="display:flex;gap:8px;align-items:center;margin-bottom:8px;">
        <input id="domModChatInput" type="text" placeholder="Mensaje al cliente…"
          style="flex:1;padding:9px 12px;border:1.5px solid var(--borde);border-radius:999px;font-size:14px;font-family:inherit;outline:none;"
          onkeydown="if(event.key==='Enter')enviarMsg('${esc(p.sessionId)}')">
        <button onclick="enviarMsg('${esc(p.sessionId)}')"
          style="width:38px;height:38px;border-radius:50%;border:none;background:var(--rappi);color:#fff;font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;">➤</button>
      </div>
      <div style="display:flex;gap:8px;align-items:center;">
        <select id="domModEtaSel" style="flex:1;padding:8px 10px;border:1.5px solid var(--borde);border-radius:10px;font-size:12px;font-family:inherit;outline:none;">
          <option value="">⏱️ Enviar tiempo estimado…</option>
          <option value="10">10 min</option><option value="15">15 min</option>
          <option value="20">20 min</option><option value="25">25 min</option>
          <option value="30">30 min</option><option value="45">45 min</option><option value="60">60 min</option>
        </select>
        <button onclick="enviarETA('${esc(p.sessionId)}')"
          style="padding:8px 12px;border:none;border-radius:10px;background:#0D47A1;color:#fff;font-size:11px;font-weight:800;cursor:pointer;font-family:inherit;white-space:nowrap;">Enviar</button>
      </div>
    </div>`;
  const ce=document.getElementById('domModChatMsgs');
  if(ce) ce.scrollTop=ce.scrollHeight;
}

async function enviarMsg(sid){
  const input=document.getElementById('domModChatInput');
  const txt=(input?.value||'').trim();
  if(!txt||!sid) return;
  input.value='';
  try{
    const{db,ref,get,update}=window._FB;
    const snap=await get(ref(db,`${DOM_PATH}/${sid}/mensajes`));
    const arr=Array.isArray(snap.val())?snap.val():[];
    arr.push({autor:'admin',texto:txt,tipo:'chat',ts:Date.now()});
    await update(ref(db,`${DOM_PATH}/${sid}`),{mensajes:arr,tsUltimoMensaje:Date.now()});
  }catch(e){showToast('⚠️ Error: '+e.message);}
}

async function enviarETA(sid){
  const sel=document.getElementById('domModEtaSel');
  const min=parseInt(sel?.value||'');
  if(!min){showToast('⚠️ Selecciona un tiempo');return;}
  const txt=`⏱️ Tu pedido llegará aproximadamente en ${min} minutos.`;
  try{
    const{db,ref,get,update}=window._FB;
    const snap=await get(ref(db,`${DOM_PATH}/${sid}/mensajes`));
    const arr=Array.isArray(snap.val())?snap.val():[];
    arr.push({autor:'admin',texto:txt,tipo:'chat',ts:Date.now()});
    await update(ref(db,`${DOM_PATH}/${sid}`),{mensajes:arr,tsUltimoMensaje:Date.now(),etaMin:min,etaTs:Date.now()});
    if(sel) sel.value='';
    showToast(`⏱️ ETA de ${min} min enviado`);
  }catch(e){showToast('⚠️ Error: '+e.message);}
}

if(window._fbReady){arrancar();}
else{window.addEventListener('firebase-ready',arrancar,{once:true});}
</script>
</body>
</html>
