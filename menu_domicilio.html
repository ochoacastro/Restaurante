<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Menú · Domicilio</title>
<meta name="theme-color" content="#FF441A">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
/* ── RESET & TOKENS ─────────────────────────────────────────── */
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
input,textarea,select{-webkit-user-select:text;user-select:text;}
:root{
  --brand:    #FF441A;
  --brand-dk: #E03310;
  --brand-sf: rgba(255,68,26,.10);
  --verde:    #00C853;
  --azul:     #1565C0;
  --rojo:     #E53935;
  --naranja:  #F57C00;
  --negro:    #111;
  --gris-osc: #444;
  --gris:     #777;
  --gris-cl:  #F2F2F2;
  --fondo:    #F7F7F7;
  --blanco:   #FFF;
  --borde:    #E4E4E4;
  --sombra-s: 0 2px 8px rgba(0,0,0,.08);
  --sombra-m: 0 4px 20px rgba(0,0,0,.13);
  --r-sm: 10px;
  --r:    16px;
  --r-lg: 22px;
  --font: 'Nunito', sans-serif;
  --font-mono: 'DM Mono', monospace;
}
body{
  font-family: var(--font);
  background: var(--fondo);
  color: var(--negro);
  min-height: 100vh;
  overflow-x: hidden;
}

/* ── PANTALLAS ──────────────────────────────────────────────── */
.screen{ display:none; min-height:100vh; flex-direction:column; }
.screen.active{ display:flex; }

/* ── HEADER COMÚN ───────────────────────────────────────────── */
.hdr{
  background: var(--blanco);
  border-bottom: 1px solid var(--borde);
  padding: 14px 16px 12px;
  position: sticky; top:0; z-index:100;
  box-shadow: var(--sombra-s);
}
.hdr-inner{ display:flex; align-items:center; gap:12px; }
.hdr-logo{
  width:40px; height:40px; border-radius:12px;
  background:var(--brand); flex-shrink:0;
  display:flex; align-items:center; justify-content:center;
  font-size:20px; font-weight:900; color:#fff;
  overflow:hidden; box-shadow:0 3px 10px rgba(255,68,26,.3);
}
.hdr-logo img{ width:100%; height:100%; object-fit:cover; }
.hdr-texts{ flex:1; min-width:0; }
.hdr-nombre{
  font-size:17px; font-weight:900; line-height:1.1;
  white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
}
.hdr-sub{ font-size:11px; color:var(--gris); font-weight:600; margin-top:2px; }
.hdr-back{
  background:none; border:none; cursor:pointer;
  width:38px; height:38px; border-radius:50%;
  display:flex; align-items:center; justify-content:center;
  font-size:20px; color:var(--gris-osc);
  flex-shrink:0;
  transition: background .15s;
}
.hdr-back:active{ background:var(--gris-cl); }

/* ── LOADING ────────────────────────────────────────────────── */
#screenLoading{
  display:flex; align-items:center; justify-content:center;
  min-height:100vh; flex-direction:column; gap:16px;
  background:var(--fondo);
}
.spinner{
  width:40px; height:40px;
  border:3px solid var(--borde);
  border-top-color:var(--brand);
  border-radius:50%;
  animation:spin .75s linear infinite;
}
@keyframes spin{ to{transform:rotate(360deg)} }
.loading-txt{ font-size:14px; color:var(--gris); font-weight:600; }

/* ── SCREEN MENÚ ────────────────────────────────────────────── */
#screenMenu{ background:var(--fondo); }

/* Hero portada */
.menu-hero{
  background: linear-gradient(160deg, #1a1a1a 0%, #333 100%);
  position:relative; overflow:hidden;
  min-height:130px;
  display:flex; align-items:flex-end;
}
.menu-hero-bg{
  position:absolute; inset:0;
  width:100%; height:100%; object-fit:cover;
  opacity:.35; display:none;
}
.menu-hero-content{
  position:relative; z-index:2;
  padding:20px 16px 16px;
  width:100%;
}
.menu-hero-logo{
  width:60px; height:60px; border-radius:16px;
  background:var(--brand); overflow:hidden;
  margin-bottom:10px;
  box-shadow: 0 4px 16px rgba(0,0,0,.3);
  display:flex; align-items:center; justify-content:center;
  font-size:28px; font-weight:900; color:#fff;
}
.menu-hero-logo img{ width:100%; height:100%; object-fit:cover; }
.menu-hero-nombre{
  font-size:22px; font-weight:900; color:#fff;
  line-height:1.1; text-shadow:0 2px 6px rgba(0,0,0,.5);
}
.menu-hero-sub{
  font-size:12px; color:rgba(255,255,255,.75);
  margin-top:4px; font-weight:600;
}
/* chip "Domicilio" */
.chip-modo{
  display:inline-flex; align-items:center; gap:5px;
  background:var(--brand); color:#fff;
  border-radius:20px; padding:4px 10px;
  font-size:11px; font-weight:800;
  margin-bottom:8px;
  box-shadow:0 2px 8px rgba(255,68,26,.4);
}

/* Categorías */
.cats-bar{
  background:var(--blanco);
  border-bottom:1px solid var(--borde);
  overflow-x:auto; white-space:nowrap;
  scrollbar-width:none;
  position:sticky; top:0; z-index:90;
  padding:0 8px;
}
.cats-bar::-webkit-scrollbar{ display:none; }
.cat-pill{
  display:inline-block; padding:11px 14px;
  font-size:13px; font-weight:700; color:var(--gris);
  cursor:pointer;
  border-bottom:3px solid transparent;
  transition:all .2s;
  white-space:nowrap;
}
.cat-pill.active{ color:var(--brand); border-bottom-color:var(--brand); }

/* Grid de platos */
.menu-body{ padding:12px 12px 120px; }
.cat-section{ margin-bottom:24px; }
.cat-title{
  font-size:13px; font-weight:900;
  color:var(--gris); letter-spacing:.5px;
  text-transform:uppercase;
  margin-bottom:10px; padding-left:2px;
}
.items-grid{ display:flex; flex-direction:column; gap:10px; }

/* Tarjeta de plato */
.item-card{
  background:var(--blanco);
  border-radius:var(--r);
  border:1.5px solid var(--borde);
  display:flex; align-items:stretch;
  overflow:hidden;
  box-shadow:var(--sombra-s);
  transition:border-color .2s, box-shadow .2s;
}
.item-card.in-cart{
  border-color:var(--brand);
  box-shadow:0 2px 12px rgba(255,68,26,.15);
}
.item-foto{
  width:88px; flex-shrink:0;
  background:var(--gris-cl);
  display:flex; align-items:center; justify-content:center;
  overflow:hidden;
}
.item-foto img{ width:100%; height:100%; object-fit:cover; display:block; }
.item-foto-placeholder{ font-size:32px; opacity:.25; }
.item-info{
  flex:1; padding:12px 12px 10px;
  display:flex; flex-direction:column;
  gap:3px;
}
.item-nombre{ font-size:14px; font-weight:800; line-height:1.3; color:var(--negro); }
.item-desc{ font-size:12px; color:var(--gris); line-height:1.4; }
.item-precio{ font-size:15px; font-weight:900; color:var(--brand); font-family:var(--font-mono); margin-top:4px; }
.item-precio-original{ font-size:11px; color:var(--gris); text-decoration:line-through; margin-left:4px; font-family:var(--font-mono); }

/* Control qty por tarjeta */
.item-qty-row{
  display:flex; align-items:center; justify-content:flex-end;
  margin-top:6px; gap:0;
}
.qty-btn{
  width:30px; height:30px; border-radius:50%;
  border:none; cursor:pointer;
  display:flex; align-items:center; justify-content:center;
  font-size:18px; font-weight:900; line-height:1;
  transition:transform .1s, background .15s;
  flex-shrink:0;
}
.qty-btn:active{ transform:scale(.88); }
.qty-btn.minus{
  background:var(--gris-cl); color:var(--gris-osc);
}
.qty-btn.plus{
  background:var(--brand); color:#fff;
  box-shadow:0 2px 8px rgba(255,68,26,.35);
}
.qty-num{
  font-size:15px; font-weight:900;
  width:32px; text-align:center;
  font-family:var(--font-mono);
}
.qty-add-btn{
  background:var(--brand-sf); color:var(--brand);
  border:1.5px solid var(--brand);
  border-radius:20px; padding:5px 14px;
  font-size:13px; font-weight:800;
  cursor:pointer;
  transition:background .15s;
}
.qty-add-btn:active{ background:var(--brand); color:#fff; }

/* Botón flotante carrito */
.cart-fab{
  position:fixed; bottom:20px; left:50%;
  transform:translateX(-50%);
  background:var(--brand);
  color:#fff; border:none; border-radius:30px;
  padding:14px 24px;
  display:flex; align-items:center; gap:10px;
  font-size:15px; font-weight:900;
  font-family:var(--font);
  cursor:pointer;
  box-shadow:0 6px 24px rgba(255,68,26,.45);
  transition:transform .2s, opacity .2s;
  z-index:200;
  white-space:nowrap;
  min-width:240px; justify-content:space-between;
}
.cart-fab.hidden{ opacity:0; pointer-events:none; transform:translateX(-50%) translateY(20px); }
.cart-fab:active{ transform:translateX(-50%) scale(.97); }
.cart-fab-badge{
  background:#fff; color:var(--brand);
  border-radius:50%; width:26px; height:26px;
  display:flex; align-items:center; justify-content:center;
  font-size:13px; font-weight:900; flex-shrink:0;
}
.cart-fab-txt{ flex:1; text-align:center; }
.cart-fab-total{ font-family:var(--font-mono); font-size:14px; flex-shrink:0; }

/* ── SCREEN CARRITO ─────────────────────────────────────────── */
#screenCarrito{ background:var(--fondo); }
.carrito-body{ flex:1; overflow-y:auto; padding:14px 14px 20px; }
.carrito-item{
  background:var(--blanco);
  border-radius:var(--r);
  border:1px solid var(--borde);
  padding:12px 14px;
  display:flex; align-items:center; gap:12px;
  margin-bottom:10px;
  box-shadow:var(--sombra-s);
}
.ci-nombre{ flex:1; font-size:14px; font-weight:800; line-height:1.3; }
.ci-qty-row{ display:flex; align-items:center; gap:0; flex-shrink:0; }
.ci-precio{ font-size:13px; font-weight:800; color:var(--brand); font-family:var(--font-mono); width:76px; text-align:right; flex-shrink:0; }

/* Resumen total */
.resumen-box{
  background:var(--blanco);
  border-radius:var(--r);
  border:1px solid var(--borde);
  padding:14px 16px;
  margin-bottom:14px;
  box-shadow:var(--sombra-s);
}
.resumen-row{
  display:flex; justify-content:space-between;
  align-items:center; padding:5px 0;
  font-size:13px; color:var(--gris-osc);
}
.resumen-row.total{
  font-size:17px; font-weight:900; color:var(--negro);
  border-top:1px solid var(--borde); margin-top:6px; padding-top:10px;
}
.resumen-row.envio{ color:var(--gris); }
.resumen-val{ font-family:var(--font-mono); font-weight:800; }
.resumen-row.total .resumen-val{ color:var(--brand); }

.carrito-empty{
  flex:1; display:flex; flex-direction:column;
  align-items:center; justify-content:center;
  padding:40px 20px; text-align:center; gap:10px;
}
.carrito-empty .ico{ font-size:56px; opacity:.3; }
.carrito-empty p{ font-size:14px; color:var(--gris); font-weight:600; }

/* Botón primario */
.btn-primary{
  background:var(--brand); color:#fff;
  border:none; border-radius:var(--r);
  padding:16px 20px;
  font-size:16px; font-weight:900;
  font-family:var(--font);
  width:100%; cursor:pointer;
  display:flex; align-items:center; justify-content:center; gap:8px;
  box-shadow:0 4px 16px rgba(255,68,26,.35);
  transition:transform .15s, box-shadow .15s;
}
.btn-primary:active{ transform:scale(.98); box-shadow:none; }
.btn-primary:disabled{ opacity:.5; pointer-events:none; }
.btn-secondary{
  background:var(--gris-cl); color:var(--gris-osc);
  border:none; border-radius:var(--r);
  padding:14px 20px;
  font-size:15px; font-weight:800;
  font-family:var(--font);
  width:100%; cursor:pointer;
  transition:background .15s;
}
.btn-secondary:active{ background:#e0e0e0; }

.carrito-footer{
  padding:14px 14px calc(14px + env(safe-area-inset-bottom));
  background:var(--blanco);
  border-top:1px solid var(--borde);
  display:flex; flex-direction:column; gap:8px;
}

/* ── SCREEN DATOS ───────────────────────────────────────────── */
#screenDatos{ background:var(--fondo); }
.datos-body{ flex:1; overflow-y:auto; padding:14px; }

.form-section{
  background:var(--blanco);
  border-radius:var(--r);
  border:1px solid var(--borde);
  padding:16px;
  margin-bottom:14px;
  box-shadow:var(--sombra-s);
}
.form-section-title{
  font-size:12px; font-weight:900;
  text-transform:uppercase; letter-spacing:.6px;
  color:var(--gris); margin-bottom:14px;
}
.form-group{ margin-bottom:14px; }
.form-group:last-child{ margin-bottom:0; }
.form-label{
  display:block; font-size:12px; font-weight:800;
  color:var(--gris-osc); margin-bottom:6px;
}
.form-label span{ color:var(--brand); }
.form-input{
  width:100%; padding:12px 14px;
  border:1.5px solid var(--borde);
  border-radius:var(--r-sm);
  font-size:15px; font-family:var(--font);
  background:var(--fondo);
  color:var(--negro);
  transition:border-color .15s;
  outline:none;
}
.form-input:focus{ border-color:var(--brand); background:var(--blanco); }
.form-input.error{ border-color:var(--rojo); }
textarea.form-input{ min-height:72px; resize:none; }

/* Métodos de pago */
.pago-grid{ display:flex; flex-direction:column; gap:8px; }
.pago-opt{
  border:1.5px solid var(--borde);
  border-radius:var(--r-sm);
  padding:12px 14px;
  display:flex; align-items:center; gap:12px;
  cursor:pointer;
  transition:border-color .15s, background .15s;
}
.pago-opt.selected{
  border-color:var(--brand);
  background:var(--brand-sf);
}
.pago-opt-img{
  width:36px; height:36px; border-radius:8px;
  background:var(--gris-cl);
  display:flex; align-items:center; justify-content:center;
  overflow:hidden; flex-shrink:0;
}
.pago-opt-img img{ width:100%; height:100%; object-fit:cover; }
.pago-opt-nombre{ font-size:14px; font-weight:800; flex:1; }
.pago-opt-info{ font-size:12px; color:var(--gris); margin-top:2px; }
.pago-check{
  width:22px; height:22px; border-radius:50%;
  border:2px solid var(--borde);
  display:flex; align-items:center; justify-content:center;
  flex-shrink:0; transition:all .15s;
}
.pago-opt.selected .pago-check{
  background:var(--brand); border-color:var(--brand); color:#fff;
  font-size:13px;
}

/* Campo devuelta efectivo */
.devuelta-box{
  margin-top:12px;
  background:var(--fondo);
  border:1.5px solid var(--borde);
  border-radius:var(--r-sm);
  padding:12px 14px;
  display:none;
}
.devuelta-box.show{ display:block; }
.devuelta-label{
  font-size:12px; font-weight:800; color:var(--gris-osc);
  margin-bottom:8px; display:block;
}
.devuelta-hint{ font-size:11px; color:var(--gris); margin-top:6px; }

/* Costo envío */
.envio-info{
  background:var(--brand-sf);
  border:1px solid rgba(255,68,26,.2);
  border-radius:var(--r-sm);
  padding:10px 14px;
  font-size:13px; color:var(--brand);
  font-weight:700; margin-bottom:14px;
  display:flex; align-items:center; gap:8px;
}

.datos-footer{
  padding:14px 14px calc(14px + env(safe-area-inset-bottom));
  background:var(--blanco);
  border-top:1px solid var(--borde);
}

/* ── SCREEN SEGUIMIENTO ─────────────────────────────────────── */
#screenSeguimiento{ background:var(--fondo); }
.seg-body{ flex:1; overflow-y:auto; padding:14px 14px 30px; }

/* Estado hero */
.estado-hero{
  border-radius:var(--r-lg);
  padding:24px 20px;
  text-align:center;
  margin-bottom:14px;
  color:#fff;
  position:relative; overflow:hidden;
}
.estado-hero-ico{ font-size:52px; margin-bottom:10px; }
.estado-hero-label{ font-size:19px; font-weight:900; }
.estado-hero-sub{ font-size:13px; opacity:.85; margin-top:4px; font-weight:600; }

/* Barra de pasos */
.pasos-bar{
  background:var(--blanco);
  border-radius:var(--r);
  border:1px solid var(--borde);
  padding:16px 14px;
  margin-bottom:14px;
  box-shadow:var(--sombra-s);
}
.pasos-title{ font-size:11px; font-weight:900; color:var(--gris); text-transform:uppercase; letter-spacing:.6px; margin-bottom:14px; }
.pasos-list{ display:flex; flex-direction:column; gap:0; }
.paso{
  display:flex; align-items:flex-start; gap:12px;
  padding:8px 0;
  position:relative;
}
.paso:not(:last-child)::after{
  content:'';
  position:absolute;
  left:15px; top:36px;
  width:2px; height:calc(100% - 8px);
  background:var(--borde);
}
.paso.done::after{ background:var(--brand); }
.paso-dot{
  width:32px; height:32px; border-radius:50%;
  border:2px solid var(--borde);
  display:flex; align-items:center; justify-content:center;
  font-size:14px; flex-shrink:0;
  background:var(--blanco);
  position:relative; z-index:1;
  transition:all .3s;
}
.paso.done .paso-dot{
  background:var(--brand); border-color:var(--brand); color:#fff;
}
.paso.current .paso-dot{
  background:var(--brand-sf); border-color:var(--brand);
  animation:pulso 1.4s ease-in-out infinite;
}
@keyframes pulso{
  0%,100%{ box-shadow:0 0 0 0 rgba(255,68,26,.4); }
  50%{ box-shadow:0 0 0 8px rgba(255,68,26,0); }
}
.paso-texts{ flex:1; padding-top:4px; }
.paso-label{ font-size:14px; font-weight:800; color:var(--gris); }
.paso.done .paso-label, .paso.current .paso-label{ color:var(--negro); }
.paso-sub{ font-size:12px; color:var(--gris); margin-top:2px; }

/* Resumen pedido en seguimiento */
.seg-card{
  background:var(--blanco);
  border-radius:var(--r);
  border:1px solid var(--borde);
  padding:16px;
  margin-bottom:14px;
  box-shadow:var(--sombra-s);
}
.seg-card-title{ font-size:12px; font-weight:900; color:var(--gris); text-transform:uppercase; letter-spacing:.6px; margin-bottom:12px; }
.seg-item-row{
  display:flex; justify-content:space-between;
  padding:5px 0; font-size:13px;
  border-bottom:1px solid var(--gris-cl);
}
.seg-item-row:last-child{ border-bottom:none; }
.seg-item-nombre{ font-weight:700; flex:1; }
.seg-item-qty{ color:var(--gris); margin:0 8px; flex-shrink:0; }
.seg-item-precio{ font-family:var(--font-mono); font-weight:800; flex-shrink:0; }
.seg-total-row{
  display:flex; justify-content:space-between; align-items:center;
  padding:10px 0 0; font-size:16px; font-weight:900;
  border-top:2px solid var(--borde); margin-top:8px;
}
.seg-total-val{ font-family:var(--font-mono); color:var(--brand); }

/* Info cliente en seguimiento */
.seg-info-row{ display:flex; gap:8px; align-items:flex-start; padding:5px 0; font-size:13px; }
.seg-info-ico{ flex-shrink:0; width:20px; text-align:center; }
.seg-info-txt{ color:var(--gris-osc); font-weight:600; }

/* Botón cancelar */
.btn-cancelar{
  background:transparent; color:var(--rojo);
  border:1.5px solid var(--rojo);
  border-radius:var(--r); padding:14px 20px;
  font-size:14px; font-weight:800; font-family:var(--font);
  width:100%; cursor:pointer; margin-top:8px;
  transition:background .15s;
}
.btn-cancelar:active{ background:rgba(229,57,53,.08); }
.btn-cancelar:disabled{ opacity:.4; pointer-events:none; }

/* Toast */
#toast{
  position:fixed; bottom:30px; left:50%;
  transform:translateX(-50%) translateY(20px);
  background:#222; color:#fff;
  border-radius:20px; padding:10px 20px;
  font-size:13px; font-weight:700;
  z-index:9999; opacity:0;
  transition:all .3s; pointer-events:none;
  white-space:nowrap; max-width:90vw;
}
#toast.show{ opacity:1; transform:translateX(-50%) translateY(0); }

/* Error pantalla */
.error-screen{
  flex:1; display:flex; flex-direction:column;
  align-items:center; justify-content:center;
  padding:40px 24px; text-align:center; gap:12px;
}
.error-screen .ico{ font-size:52px; }
.error-screen h2{ font-size:18px; font-weight:900; color:var(--rojo); }
.error-screen p{ font-size:13px; color:var(--gris); line-height:1.6; }

/* Cancelado */
.cancelado-screen{
  flex:1; display:flex; flex-direction:column;
  align-items:center; justify-content:center;
  padding:40px 24px; text-align:center; gap:12px;
}
.cancelado-screen .ico{ font-size:64px; }

<!-- TOAST -->
<div id="toast"></div>

<script type="module">
// ════════════════════════════════════════════════════════════════
// IMPORTS FIREBASE
// ════════════════════════════════════════════════════════════════
import { initializeApp, getApps } from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js';
import {
  getDatabase, ref, get, set, update, onValue, off
} from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js';

// ════════════════════════════════════════════════════════════════
// ESTADO GLOBAL
// ════════════════════════════════════════════════════════════════
let db, fbApp;
let menuItems    = [];
let config       = {};
let menuSettings = {};
let cart         = {};          // { nombre: { item, qty } }
let payMethods   = [];
let paySelected  = null;
let costoEnvio   = 0;
let seguimientoUnsub = null;
let sessionActiva    = null;    // sessionId activo en localStorage

const SESSION_KEY = 'dom_session_v1';

// ════════════════════════════════════════════════════════════════
// UTILS
// ════════════════════════════════════════════════════════════════
function fmt(n){ return '$ ' + Number(n||0).toLocaleString('es-CO'); }
function esc(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function genId(){ return Date.now().toString(36) + Math.random().toString(36).slice(2,7); }

function showToast(msg, dur=3000){
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  clearTimeout(t._t);
  t._t = setTimeout(() => t.classList.remove('show'), dur);
}

function showScreen(id){
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  const el = document.getElementById('screen' + id.charAt(0).toUpperCase() + id.slice(1));
  if (el) el.classList.add('active');
  window.scrollTo(0,0);
}

// ════════════════════════════════════════════════════════════════
// FIREBASE — INICIALIZAR Y CARGAR TODO
// ════════════════════════════════════════════════════════════════
async function init() {
  // Leer config Firebase desde localStorage (lo guarda index.html)
  let fbConfig;
  try {
    const raw = localStorage.getItem('pos_fb_config');
    if (raw) fbConfig = JSON.parse(raw);
  } catch(e) {}

  if (!fbConfig) {
    // Fallback: config hardcoded (la misma que index.html tiene por defecto)
    fbConfig = {
      apiKey:            "AIzaSyDqkmnJoldzILAY41ll_sQ4n29WM1XSvyA",
      databaseURL:       "https://los-helechos-8-default-rtdb.firebaseio.com",
      authDomain:        "los-helechos-8.firebaseapp.com",
      projectId:         "los-helechos-8",
      storageBucket:     "los-helechos-8.firebasestorage.app",
      messagingSenderId: "630169032531",
      appId:             "1:630169032531:web:bdfbc2219f89f01c77b3a6",
    };
  }

  try {
    fbApp = getApps().length ? getApps()[0] : initializeApp(fbConfig);
    db    = getDatabase(fbApp);

    // Cargar en paralelo
    const [snapMenu, snapConfig, snapSettings] = await Promise.all([
      get(ref(db, 'restaurante/menu')),
      get(ref(db, 'restaurante/config')),
      get(ref(db, 'restaurante/menuSettings')),
    ]);

    menuItems    = snapMenu.exists()     ? (snapMenu.val() || []) : [];
    config       = snapConfig.exists()   ? (snapConfig.val() || {}) : {};
    menuSettings = snapSettings.exists() ? (snapSettings.val() || {}) : {};

    // Fallback localStorage si Firebase vacío
    if (!menuItems.length) {
      try {
        const ls = localStorage.getItem('pos_menu_custom_v3') || localStorage.getItem('pos_menu');
        if (ls) { const p = JSON.parse(ls); menuItems = Array.isArray(p) ? p : []; }
      } catch(e) {}
    }
    if (!Object.keys(menuSettings).length) {
      try {
        const ls = localStorage.getItem('pos_menu_settings_v1');
        if (ls) menuSettings = JSON.parse(ls);
      } catch(e) {}
    }

    // Métodos de pago visibles en domicilio
    const allPay = Array.isArray(menuSettings.paymentMethods) ? menuSettings.paymentMethods : [
      { id:'p1', label:'Efectivo', img:null, info:'', visibleDom:true },
      { id:'p2', label:'Transferencia', img:null, info:'', visibleDom:true },
    ];
    payMethods = allPay.filter(m => m.visibleDom !== false);
    if (payMethods.length) paySelected = payMethods[0].id;

    // Costo de envío
    costoEnvio = (config.cobrarEnvio && config.costoEnvio > 0) ? Number(config.costoEnvio) : 0;

    // ¿Hay sesión activa guardada?
    const sesGuardada = localStorage.getItem(SESSION_KEY);
    if (sesGuardada) {
      await verificarSesionActiva(sesGuardada);
      return; // verificarSesionActiva decide qué pantalla mostrar
    }

    renderApp();

  } catch(e) {
    console.error('init error:', e);
    document.getElementById('screenLoading').innerHTML = `
      <div class="error-screen">
        <div class="ico">⚠️</div>
        <h2>Error de conexión</h2>
        <p>No se pudo cargar el menú.<br>Verifica tu conexión a internet.</p>
        <button onclick="location.reload()" style="margin-top:16px;padding:12px 24px;background:var(--brand);color:#fff;border:none;border-radius:14px;font-size:14px;font-weight:800;cursor:pointer;">Reintentar</button>
      </div>`;
  }
}

async function verificarSesionActiva(sessionId) {
  try {
    const snap = await get(ref(db, `restaurante/domicilios/${sessionId}`));
    if (!snap.exists()) {
      localStorage.removeItem(SESSION_KEY);
      renderApp();
      return;
    }
    const pedido = snap.val();
    const terminado = ['entregado','cancelado'].includes(pedido.estado);
    if (terminado) {
      localStorage.removeItem(SESSION_KEY);
      renderApp();
      return;
    }
    // Hay pedido activo — ir directo a seguimiento
    sessionActiva = sessionId;
    renderApp();
    showScreen('seguimiento');
    iniciarSeguimiento(sessionId);
  } catch(e) {
    localStorage.removeItem(SESSION_KEY);
    renderApp();
  }
}

// ════════════════════════════════════════════════════════════════
// RENDER APP (menú, hero, header)
// ════════════════════════════════════════════════════════════════
function renderApp() {
  document.getElementById('screenLoading').style.display = 'none';

  // Nombre y logo
  const nombre = menuSettings.restaurantNombre || config.nombre || 'Restaurante';
  const logo   = menuSettings.businessLogo || localStorage.getItem('pos_logo') || '';
  const eslogan = menuSettings.eslogan || config.slogan || 'Selecciona tus platos favoritos';

  // Header
  const hdrNombre = document.getElementById('hdrNombre');
  const hdrLogo   = document.getElementById('hdrLogo');
  if (hdrNombre) hdrNombre.textContent = nombre;
  if (hdrLogo) {
    if (logo) hdrLogo.innerHTML = `<img src="${logo}" alt="">`;
    else hdrLogo.textContent = nombre.charAt(0).toUpperCase();
  }

  // Hero
  document.getElementById('heroNombre').textContent = nombre;
  document.getElementById('heroSub').textContent = eslogan;
  if (menuSettings.headerBg) {
    const bg = document.getElementById('heroBg');
    bg.src = menuSettings.headerBg; bg.style.display = 'block';
  }

  // Scroll del menú → mostrar/ocultar header sticky
  const menuHdr = document.getElementById('menuHdr');
  const hero    = document.getElementById('menuHero');
  const screenM = document.getElementById('screenMenu');
  if (menuHdr && hero) {
    screenM.addEventListener('scroll', () => {
      const heroBottom = hero.getBoundingClientRect().bottom;
      menuHdr.style.display = heroBottom < 0 ? '' : 'none';
    }, { passive:true });
  }

  // Aplicar colores personalizados
  if (menuSettings.colorPrimario) {
    document.documentElement.style.setProperty('--brand', menuSettings.colorPrimario);
    document.documentElement.style.setProperty('--brand-dk', menuSettings.colorPrimario);
  }
  if (menuSettings.colorAccent) {
    document.documentElement.style.setProperty('--verde', menuSettings.colorAccent);
  }

  renderCategorias();
  renderMenu();
  renderPagoGrid();
  showScreen('menu');
}

// ════════════════════════════════════════════════════════════════
// RENDER MENÚ
// ════════════════════════════════════════════════════════════════
function getPrice(item) {
  return (menuSettings && menuSettings.mostrarPrecioDomicilio !== false && item.precioDomicilio && item.precioDomicilio > 0)
    ? item.precioDomicilio
    : item.precio;
}

function renderCategorias() {
  const bar = document.getElementById('catsBar');
  const hidden = Array.isArray(menuSettings.hiddenCategories) ? menuSettings.hiddenCategories : [];
  const visibles = menuItems.filter(i => i.disponible !== false && !hidden.includes(i.categoria));
  const cats = [...new Set(visibles.map(i => i.categoria).filter(Boolean))];

  // Ordenar según catOrder si existe
  const catOrder = Array.isArray(menuSettings.catOrder) ? menuSettings.catOrder : [];
  const ordered = catOrder.length
    ? [...catOrder.filter(c => cats.includes(c)), ...cats.filter(c => !catOrder.includes(c))]
    : cats;

  bar.innerHTML = ordered.map((c,i) =>
    `<span class="cat-pill${i===0?' active':''}" data-cat="${esc(c)}">${esc(c)}</span>`
  ).join('');

  bar.querySelectorAll('.cat-pill').forEach(pill => {
    pill.addEventListener('click', function() {
      bar.querySelectorAll('.cat-pill').forEach(p => p.classList.remove('active'));
      this.classList.add('active');
      const sec = document.getElementById('cat-' + this.dataset.cat.replace(/\s+/g,'_'));
      if (sec) sec.scrollIntoView({ behavior:'smooth', block:'start' });
    });
  });
}

function renderMenu() {
  const body   = document.getElementById('menuBody');
  const hidden = Array.isArray(menuSettings.hiddenCategories) ? menuSettings.hiddenCategories : [];
  const visibles = menuItems.filter(i => i.disponible !== false && !hidden.includes(i.categoria));

  const catOrder = Array.isArray(menuSettings.catOrder) ? menuSettings.catOrder : [];
  const allCats  = [...new Set(visibles.map(i => i.categoria).filter(Boolean))];
  const cats = catOrder.length
    ? [...catOrder.filter(c => allCats.includes(c)), ...allCats.filter(c => !catOrder.includes(c))]
    : allCats;

  if (!cats.length) {
    body.innerHTML = '<p style="text-align:center;padding:40px 20px;color:var(--gris);font-weight:700;">El menú está vacío por el momento.</p>';
    return;
  }

  body.innerHTML = cats.map(cat => {
    const items = visibles.filter(i => i.categoria === cat);
    if (!items.length) return '';
    return `
      <div class="cat-section" id="cat-${cat.replace(/\s+/g,'_')}" style="scroll-margin-top:50px;">
        <div class="cat-title">${esc(cat)}</div>
        <div class="items-grid">
          ${items.map(item => renderItemCard(item)).join('')}
        </div>
      </div>`;
  }).join('');
}

function renderItemCard(item) {
  const precio = getPrice(item);
  const precioOriginal = (item.precioDomicilio && item.precioDomicilio !== item.precio) ? item.precio : null;
  const qty = cart[item.nombre]?.qty || 0;
  const inCart = qty > 0;

  const imgHtml = item.foto
    ? `<img src="${item.foto}" alt="${esc(item.nombre)}" loading="lazy" onerror="this.parentElement.innerHTML='<div class=item-foto-placeholder>🍽️</div>'">`
    : `<div class="item-foto-placeholder">🍽️</div>`;

  const qtyCtrl = qty > 0
    ? `<div class="item-qty-row">
        <button class="qty-btn minus" onclick="cambiarQty('${esc(item.nombre)}',-1)">−</button>
        <span class="qty-num">${qty}</span>
        <button class="qty-btn plus" onclick="cambiarQty('${esc(item.nombre)}',1)">+</button>
       </div>`
    : `<div class="item-qty-row">
        <button class="qty-add-btn" onclick="cambiarQty('${esc(item.nombre)}',1)">+ Agregar</button>
       </div>`;

  return `
    <div class="item-card${inCart?' in-cart':''}" id="card-${esc(item.nombre.replace(/\s+/g,'_'))}">
      <div class="item-foto">${imgHtml}</div>
      <div class="item-info">
        <div class="item-nombre">${esc(item.nombre)}</div>
        ${item.descripcion ? `<div class="item-desc">${esc(item.descripcion)}</div>` : ''}
        <div>
          <span class="item-precio">${fmt(precio)}</span>
          ${precioOriginal ? `<span class="item-precio-original">${fmt(precioOriginal)}</span>` : ''}
        </div>
        ${qtyCtrl}
      </div>
    </div>`;
}

// ════════════════════════════════════════════════════════════════
// CARRITO
// ════════════════════════════════════════════════════════════════
window.cambiarQty = function(nombre, delta) {
  const item = menuItems.find(i => i.nombre === nombre);
  if (!item) return;
  const precio = getPrice(item);

  if (!cart[nombre]) cart[nombre] = { item, qty: 0, precio };
  cart[nombre].qty = Math.max(0, cart[nombre].qty + delta);
  if (cart[nombre].qty === 0) delete cart[nombre];

  // Refrescar solo la tarjeta tocada
  const cardEl = document.getElementById('card-' + nombre.replace(/\s+/g,'_'));
  if (cardEl) {
    const nuevo = renderItemCard(item);
    const tmp = document.createElement('div');
    tmp.innerHTML = nuevo;
    cardEl.replaceWith(tmp.firstElementChild);
  }

  actualizarFab();
};

function cartItems() {
  return Object.values(cart).filter(c => c.qty > 0);
}

function cartTotal() {
  return cartItems().reduce((s, c) => s + c.precio * c.qty, 0);
}

function cartCount() {
  return cartItems().reduce((s, c) => s + c.qty, 0);
}

function actualizarFab() {
  const fab   = document.getElementById('cartFab');
  const badge = document.getElementById('fabBadge');
  const total = document.getElementById('fabTotal');
  const n = cartCount();
  if (n > 0) {
    fab.classList.remove('hidden');
    badge.textContent = n;
    total.textContent = fmt(cartTotal());
  } else {
    fab.classList.add('hidden');
  }
}

window.irACarrito = function() {
  if (!cartCount()) return;
  renderCarrito();
  showScreen('carrito');
};

function renderCarrito() {
  const body = document.getElementById('carritoBody');
  const items = cartItems();

  document.getElementById('carritoSubtitle').textContent =
    `${cartCount()} producto${cartCount()!==1?'s':''}`;

  if (!items.length) {
    body.innerHTML = `
      <div class="carrito-empty">
        <div class="ico">🛒</div>
        <p>Tu carrito está vacío</p>
      </div>`;
    document.getElementById('btnContinuar').disabled = true;
    document.getElementById('carritoResumen').innerHTML = '';
    return;
  }

  document.getElementById('btnContinuar').disabled = false;

  body.innerHTML = items.map(c => `
    <div class="carrito-item">
      <div class="ci-nombre">${esc(c.item.nombre)}</div>
      <div class="ci-qty-row">
        <button class="qty-btn minus" onclick="cambiarQtyCarrito('${esc(c.item.nombre)}',-1)">−</button>
        <span class="qty-num">${c.qty}</span>
        <button class="qty-btn plus" onclick="cambiarQtyCarrito('${esc(c.item.nombre)}',1)">+</button>
      </div>
      <div class="ci-precio">${fmt(c.precio * c.qty)}</div>
    </div>`).join('');

  // Resumen
  const sub = cartTotal();
  const total = sub + costoEnvio;
  let resumenHtml = `
    <div class="resumen-row"><span>Subtotal</span><span class="resumen-val">${fmt(sub)}</span></div>`;
  if (costoEnvio > 0) {
    resumenHtml += `<div class="resumen-row envio"><span>🛵 Envío</span><span class="resumen-val">${fmt(costoEnvio)}</span></div>`;
  }
  resumenHtml += `<div class="resumen-row total"><span>Total</span><span class="resumen-val">${fmt(total)}</span></div>`;
  document.getElementById('carritoResumen').innerHTML = resumenHtml;
}

window.cambiarQtyCarrito = function(nombre, delta) {
  window.cambiarQty(nombre, delta);
  renderCarrito();
};

window.irADatos = function() {
  if (!cartCount()) return;
  renderDatosResumen();

  // Costo de envío
  const envioBox = document.getElementById('envioInfoBox');
  const envioTxt = document.getElementById('envioInfoTxt');
  if (costoEnvio > 0) {
    envioTxt.textContent = `Costo de envío: ${fmt(costoEnvio)}`;
    envioBox.style.display = 'flex';
  } else {
    envioBox.style.display = 'none';
  }

  showScreen('datos');
  actualizarDevuelta();
};

function renderDatosResumen() {
  const box = document.getElementById('datosResumenRapido');
  const items = cartItems();
  const sub = cartTotal();
  const total = sub + costoEnvio;
  box.innerHTML = `
    <div class="form-section-title">🛒 Tu pedido (${cartCount()} producto${cartCount()!==1?'s':''})</div>
    ${items.map(c => `
      <div class="resumen-row">
        <span>${esc(c.item.nombre)} ×${c.qty}</span>
        <span class="resumen-val">${fmt(c.precio * c.qty)}</span>
      </div>`).join('')}
    <div class="resumen-row total"><span>Total</span><span class="resumen-val">${fmt(total)}</span></div>`;
}

function renderPagoGrid() {
  const grid = document.getElementById('pagoGrid');
  if (!payMethods.length) {
    document.getElementById('pagoSection').style.display = 'none';
    return;
  }
  grid.innerHTML = payMethods.map(m => {
    const sel = m.id === paySelected;
    return `
      <div class="pago-opt${sel?' selected':''}" onclick="selPago('${esc(m.id)}')">
        <div class="pago-opt-img">
          ${m.img ? `<img src="${m.img}" alt="">` : '<span style="font-size:20px;">💳</span>'}
        </div>
        <div style="flex:1;">
          <div class="pago-opt-nombre">${esc(m.label)}</div>
          ${m.info ? `<div class="pago-opt-info">${esc(m.info)}</div>` : ''}
        </div>
        <div class="pago-check">${sel?'✓':''}</div>
      </div>`;
  }).join('');
}

window.selPago = function(id) {
  paySelected = id;
  renderPagoGrid();
  actualizarDevuelta();
};

function esEfectivo() {
  const m = payMethods.find(m => m.id === paySelected);
  return m && m.label.toLowerCase().includes('efectivo');
}

function actualizarDevuelta() {
  const box = document.getElementById('devueltaBox');
  if (!box) return;
  if (esEfectivo()) {
    box.classList.add('show');
    calcularCambio();
  } else {
    box.classList.remove('show');
  }
}

function calcularCambio() {
  const hint = document.getElementById('devueltaHint');
  const inp  = document.getElementById('fDevuelta');
  if (!hint || !inp) return;
  const total = cartTotal() + costoEnvio;
  const raw   = inp.value.replace(/\D/g,'');
  const conQue = raw ? parseInt(raw, 10) : 0;
  if (conQue >= total) {
    hint.textContent = `Cambio a devolver: ${fmt(conQue - total)}`;
    hint.style.color = 'var(--verde)';
  } else if (conQue > 0) {
    hint.textContent = `⚠️ El valor es menor al total (${fmt(total)})`;
    hint.style.color = 'var(--rojo)';
  } else {
    hint.textContent = 'El repartidor llevará el cambio exacto.';
    hint.style.color = 'var(--gris)';
  }
}

// Listener para recalcular en tiempo real mientras escribe
document.addEventListener('input', function(e) {
  if (e.target.id === 'fDevuelta') calcularCambio();
});

// ENVIAR PEDIDO
// ════════════════════════════════════════════════════════════════
window.enviarPedido = async function() {
  // Validar campos
  const nombre   = document.getElementById('fNombre').value.trim();
  const telefono = document.getElementById('fTelefono').value.trim();
  const direccion= document.getElementById('fDireccion').value.trim();
  const notas    = document.getElementById('fNotas').value.trim();

  let ok = true;
  ['fNombre','fTelefono','fDireccion'].forEach(id => {
    const el = document.getElementById(id);
    if (!el.value.trim()) { el.classList.add('error'); ok = false; }
    else el.classList.remove('error');
  });
  if (!ok) { showToast('⚠️ Completa los campos obligatorios'); return; }
  if (!cartCount()) { showToast('⚠️ Tu carrito está vacío'); return; }

  const btn = document.getElementById('btnEnviar');
  btn.disabled = true;
  btn.textContent = '⏳ Enviando…';

  try {
    const sessionId = genId();
    const items = cartItems().map(c => ({
      nombre:    c.item.nombre,
      cantidad:  c.qty,
      precio:    c.precio,
      subtotal:  c.precio * c.qty,
    }));

    const pedido = {
      sessionId,
      estado:           'pendiente',
      timestamp:        Date.now(),
      clienteNombre:    nombre,
      clienteTelefono:  telefono,
      clienteDireccion: direccion,
      clienteNotas:     notas,
      items,
      costoEnvio:       costoEnvio,
      metodoPago:       null,       // se elige después de confirmación del admin
      metodoPagoLabel:  null,
      tipoDocumento:    'sin_fe',
      sinStock:         [],
      requierePago:     false,
    };

    await set(ref(db, `restaurante/domicilios/${sessionId}`), pedido);

    // Guardar sesión para recuperar si cierra el tab
    localStorage.setItem(SESSION_KEY, sessionId);
    sessionActiva = sessionId;

    // Limpiar carrito
    cart = {};
    actualizarFab();

    // Ir a seguimiento
    document.getElementById('segSessionId').textContent = 'ID: ' + sessionId.slice(-6).toUpperCase();
    showScreen('seguimiento');
    iniciarSeguimiento(sessionId);

  } catch(e) {
    console.error('enviarPedido error:', e);
    showToast('❌ Error al enviar el pedido. Intenta de nuevo.');
  } finally {
    btn.disabled = false;
    btn.textContent = '🛵 Enviar pedido al restaurante';
  }
};

// SEGUIMIENTO EN TIEMPO REAL
// ════════════════════════════════════════════════════════════════
const ESTADOS = {
  pendiente:   { label:'🕐 Recibiendo tu pedido',      sub:'El restaurante recibió tu pedido',         color:'#FF9800', ico:'📥' },
  verificando: { label:'🔍 Verificando disponibilidad', sub:'Revisando que todo esté disponible',       color:'#1565C0', ico:'🔍' },
  cambio:      { label:'⚠️ Cambio requerido',           sub:'El restaurante necesita ajustar tu pedido',color:'#E53935', ico:'⚠️' },
  confirmado:  { label:'✅ Pedido confirmado',           sub:'¡Tu pedido fue aceptado!',                color:'#2E7D32', ico:'✅' },
  pago:        { label:'💳 Procesando pago',            sub:'Confirmando tu método de pago',           color:'#F57C00', ico:'💳' },
  pago_pendiente:{ label:'💳 Pago por confirmar',       sub:'Esperando confirmación de pago',          color:'#F57C00', ico:'💳' },
  pago_revisando:{ label:'🔍 Revisando comprobante',    sub:'El restaurante revisa tu pago',           color:'#1565C0', ico:'🔍' },
  pago_rechazado:{ label:'❌ Comprobante rechazado',    sub:'Por favor contacta al restaurante',       color:'#E53935', ico:'❌' },
  cocina:      { label:'🍳 Preparando tu pedido',       sub:'¡Estamos cocinando con amor!',            color:'#EF6C00', ico:'🍳' },
  listo:       { label:'📦 Listo para envío',           sub:'Tu pedido está listo para el repartidor', color:'#2E7D32', ico:'📦' },
  despachado:  { label:'🛵 ¡Tu pedido va en camino!',   sub:'El repartidor está en camino',            color:'#0D47A1', ico:'🛵' },
  entregado:   { label:'🏠 ¡Pedido entregado!',         sub:'¡Gracias por tu pedido! Buen provecho',  color:'#1B5E20', ico:'🏠' },
  cancelado:   { label:'❌ Pedido cancelado',            sub:'Tu pedido fue cancelado',                color:'#888',    ico:'😔' },
};

const PASOS = [
  { k:'pendiente',   label:'Recibido',  sub:'Tu pedido fue recibido' },
  { k:'verificando', label:'Verificado',sub:'Confirmamos disponibilidad' },
  { k:'confirmado',  label:'Confirmado',sub:'¡Pedido aceptado!' },
  { k:'cocina',      label:'En cocina', sub:'Preparando tu pedido' },
  { k:'listo',       label:'Listo',     sub:'Listo para el repartidor' },
  { k:'despachado',  label:'En camino', sub:'El repartidor viene hacia ti' },
];

function iniciarSeguimiento(sessionId) {
  if (seguimientoUnsub) { seguimientoUnsub(); seguimientoUnsub = null; }
  const r = ref(db, `restaurante/domicilios/${sessionId}`);
  seguimientoUnsub = onValue(r, snap => {
    const p = snap.val();
    if (!p) {
      document.getElementById('segBody').innerHTML = `
        <div class="error-screen">
          <div class="ico">🔍</div>
          <h2>Pedido no encontrado</h2>
          <p>No encontramos tu pedido. Contacta al restaurante.</p>
          <button onclick="volverAlMenu()" style="margin-top:16px;padding:12px 24px;background:var(--brand);color:#fff;border:none;border-radius:14px;font-size:14px;font-weight:800;cursor:pointer;">Volver al menú</button>
        </div>`;
      return;
    }
    renderSeguimiento(p);
  });
}

function renderSeguimiento(p) {
  const body   = document.getElementById('segBody');
  const estado = p.estado || 'pendiente';
  const info   = ESTADOS[estado] || ESTADOS.pendiente;
  const items  = p.items || [];
  const sub    = items.reduce((s,i) => s + (i.precio||0)*(i.cantidad||1), 0);
  const total  = sub + (p.costoEnvio || 0);

  // Pantalla especial: cancelado
  if (estado === 'cancelado') {
    localStorage.removeItem(SESSION_KEY);
    body.innerHTML = `
      <div class="cancelado-screen">
        <div class="ico">😔</div>
        <h2>Pedido cancelado</h2>
        <p>Lo sentimos, tu pedido fue cancelado. Si tienes alguna pregunta, comunícate con el restaurante.</p>
        <button class="btn-volver" onclick="volverAlMenu()">Hacer un nuevo pedido</button>
      </div>`;
    return;
  }

  // Pantalla especial: entregado
  if (estado === 'entregado') {
    localStorage.removeItem(SESSION_KEY);
    body.innerHTML = `
      <div class="cancelado-screen" style="gap:14px;">
        <div class="ico">🎉</div>
        <h2 style="color:var(--verde);">¡Pedido entregado!</h2>
        <p>Gracias por tu pedido. ¡Que lo disfrutes!</p>
        <button class="btn-volver" onclick="volverAlMenu()">Hacer un nuevo pedido</button>
      </div>`;
    return;
  }

  // Calcular posición en los pasos
  const idxActual = PASOS.findIndex(x => x.k === estado);

  // Barra de pasos
  const pasosHtml = PASOS.map((paso, idx) => {
    let cls = '';
    if (idxActual < 0) cls = '';
    else if (idx < idxActual)  cls = 'done';
    else if (idx === idxActual) cls = 'done current';
    return `
      <div class="paso ${cls}">
        <div class="paso-dot">${cls.includes('done') ? (cls.includes('current') ? ESTADOS[paso.k]?.ico||'●' : '✓') : ''}</div>
        <div class="paso-texts">
          <div class="paso-label">${paso.label}</div>
          <div class="paso-sub">${paso.sub}</div>
        </div>
      </div>`;
  }).join('');

  // ¿Se puede cancelar?
  const puedeCancelar = ['pendiente','verificando'].includes(estado);

  // Items del pedido
  const itemsHtml = items.map(i => `
    <div class="seg-item-row">
      <span class="seg-item-nombre">${esc(i.nombre)}</span>
      <span class="seg-item-qty">×${i.cantidad}</span>
      <span class="seg-item-precio">${fmt((i.precio||0)*(i.cantidad||1))}</span>
    </div>`).join('');

  // ── BLOQUE DE PAGO: solo aparece en estado 'confirmado' ──────
  // El admin confirmó disponibilidad → el cliente elige cómo pagar
  let pagoHtml = '';
  if (estado === 'confirmado' && !p.metodoPago) {
    pagoHtml = renderBloqueSeleccionPago(p, total);
  } else if (['pago_revisando','pago_rechazado'].includes(estado) || (p.metodoPago && !esEfectivoLabel(p.metodoPagoLabel) && !['cocina','listo','despachado','entregado'].includes(estado))) {
    pagoHtml = renderBloqueComprobante(p, total);
  }

  // Info pago (ya seleccionado)
  const infoMetodoPago = p.metodoPago
    ? `<div class="seg-info-row"><span class="seg-info-ico">💳</span><span class="seg-info-txt">${esc(p.metodoPagoLabel||p.metodoPago)}</span></div>
       ${p.pagoConQue ? `<div class="seg-info-row"><span class="seg-info-ico">💵</span><span class="seg-info-txt">Paga con: ${fmt(p.pagoConQue)} · Cambio: ${fmt(p.cambioADevolver||0)}</span></div>` : ''}`
    : `<div class="seg-info-row"><span class="seg-info-ico">💳</span><span class="seg-info-txt" style="color:var(--gris);">Pago pendiente de selección</span></div>`;

  body.innerHTML = `
    <!-- Estado hero -->
    <div class="estado-hero" style="background:${info.color};">
      <div class="estado-hero-ico">${info.ico}</div>
      <div class="estado-hero-label">${info.label}</div>
      <div class="estado-hero-sub">${info.sub}</div>
    </div>

    ${pagoHtml}

    <!-- Progreso -->
    <div class="pasos-bar">
      <div class="pasos-title">Progreso de tu pedido</div>
      <div class="pasos-list">${pasosHtml}</div>
    </div>

    <!-- Detalle pedido -->
    <div class="seg-card">
      <div class="seg-card-title">📋 Tu pedido</div>
      ${itemsHtml}
      ${p.costoEnvio > 0 ? `<div class="seg-item-row"><span class="seg-item-nombre">🛵 Envío</span><span class="seg-item-qty"></span><span class="seg-item-precio">${fmt(p.costoEnvio)}</span></div>` : ''}
      <div class="seg-total-row">
        <span>Total</span>
        <span class="seg-total-val">${fmt(total)}</span>
      </div>
    </div>

    <!-- Info cliente -->
    <div class="seg-card">
      <div class="seg-card-title">📍 Datos de entrega</div>
      <div class="seg-info-row"><span class="seg-info-ico">👤</span><span class="seg-info-txt">${esc(p.clienteNombre||'')}</span></div>
      <div class="seg-info-row"><span class="seg-info-ico">📞</span><span class="seg-info-txt">${esc(p.clienteTelefono||'')}</span></div>
      <div class="seg-info-row"><span class="seg-info-ico">🏠</span><span class="seg-info-txt">${esc(p.clienteDireccion||'')}</span></div>
      ${p.clienteNotas ? `<div class="seg-info-row"><span class="seg-info-ico">📝</span><span class="seg-info-txt">${esc(p.clienteNotas)}</span></div>` : ''}
      ${infoMetodoPago}
    </div>

    <!-- Botón cancelar -->
    ${puedeCancelar ? `
    <button class="btn-cancelar" id="btnCancelar" onclick="cancelarPedido('${esc(p.sessionId)}')">
      ✕ Cancelar mi pedido
    </button>` : ''}
  `;

  // Listener preview imagen tras render
  const fileInput = document.getElementById('comprobanteFile');
  if (fileInput) {
    fileInput.addEventListener('change', function() {
      const file = this.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = e => {
        const prev = document.getElementById('comprobantePrev');
        if (prev) { prev.src = e.target.result; prev.classList.add('show'); }
      };
      reader.readAsDataURL(file);
    });
  }
}

// ── Helpers bloque pago ─────────────────────────────────────────
function esEfectivoLabel(label) {
  return label && label.toLowerCase().includes('efectivo');
}

function renderBloqueSeleccionPago(p, total) {
  const metodosHtml = payMethods.map(m => `
    <div class="pago-metodo-sel" onclick="segSelPago('${esc(m.id)}','${esc(m.label)}','${esc(p.sessionId)}',${total})" id="pm-${esc(m.id)}">
      <div class="pago-metodo-ico">${m.img ? `<img src="${m.img}" style="width:28px;height:28px;border-radius:6px;object-fit:cover;">` : '💳'}</div>
      <div style="flex:1;">
        <div class="pago-metodo-nombre">${esc(m.label)}</div>
        ${m.info ? `<div class="pago-metodo-info">${esc(m.info)}</div>` : ''}
      </div>
      <div class="pago-metodo-radio"></div>
    </div>`).join('');

  return `
    <div class="pago-seg-box">
      <div class="pago-seg-title">💳 Elige cómo pagar</div>
      <p style="font-size:13px;color:var(--gris-osc);margin-bottom:12px;font-weight:600;">
        Tu pedido fue confirmado. Total a pagar: <strong style="color:var(--brand);">${fmt(total)}</strong>
      </p>
      ${metodosHtml}
    </div>`;
}

function renderBloqueComprobante(p, total) {
  const rechazado  = p.estado === 'pago_rechazado';
  const revisando  = p.estado === 'pago_revisando';
  const yaEnviado  = !!p.comprobanteImg;
  const efectivo   = esEfectivoLabel(p.metodoPagoLabel);

  if (efectivo) return ''; // Efectivo no necesita comprobante

  const instrInfo = payMethods.find(m => m.id === p.metodoPago);
  const instrTxt  = instrInfo?.info || 'Realiza tu pago por el medio seleccionado.';

  return `
    <div class="pago-seg-box">
      <div class="pago-seg-title">💳 Comprobante de pago</div>
      ${rechazado ? `<div class="rechazo-motivo">❌ Comprobante rechazado: ${esc(p.motivoRechazo||'No válido')}.<br>Por favor sube uno nuevo.</div>` : ''}
      ${revisando && yaEnviado ? `<div class="comprobante-enviado">✅ Comprobante recibido — el restaurante lo está revisando.</div>` : ''}
      ${!revisando || !yaEnviado || rechazado ? `
        <div class="pago-instrucciones">
          <strong>Método:</strong> ${esc(p.metodoPagoLabel||'')} · <strong>Total:</strong> ${fmt(total)}<br>
          ${esc(instrTxt)}<br>
          Luego descarga el comprobante y súbelo aquí.
        </div>
        <div class="comprobante-box">
          <span class="comprobante-label">📎 Subir comprobante de pago</span>
          <div class="comprobante-upload">
            <input type="file" id="comprobanteFile" accept="image/*" capture="environment">
            <div class="comprobante-upload-ico">📷</div>
            <div class="comprobante-upload-txt">Toca para seleccionar o tomar foto</div>
          </div>
          <img class="comprobante-preview" id="comprobantePrev" src="" alt="Comprobante">
          <button class="btn-enviar-comprobante" id="btnSubirComprobante" onclick="subirComprobante('${esc(p.sessionId)}')">
            📤 Enviar comprobante al restaurante
          </button>
        </div>` : ''}
    </div>`;
}

// ── Cliente selecciona método de pago (en estado 'confirmado') ──
window.segSelPago = async function(metodoPagoId, metodoPagoLabel, sessionId, total) {
  // Resaltar selección visualmente
  document.querySelectorAll('.pago-metodo-sel').forEach(el => el.classList.remove('selected'));
  const el = document.getElementById('pm-' + metodoPagoId);
  if (el) { el.classList.add('selected'); el.querySelector('.pago-metodo-radio').textContent = '✓'; }

  const esEfectivo = metodoPagoLabel.toLowerCase().includes('efectivo');

  if (esEfectivo) {
    // Efectivo: pedir devuelta y confirmar
    const conQueStr = prompt(`💵 ¿Con cuánto vas a pagar?\nTotal del pedido: ${fmt(total)}\n\nEscribe el valor (ej: 50000) o deja vacío si es exacto:`);
    const conQue = conQueStr ? parseInt(conQueStr.replace(/\D/g,''), 10) : 0;
    if (conQue > 0 && conQue < total) {
      alert('⚠️ El valor ingresado es menor al total del pedido.');
      return;
    }
    try {
      await update(ref(db, `restaurante/domicilios/${sessionId}`), {
        metodoPago:      metodoPagoId,
        metodoPagoLabel: metodoPagoLabel,
        pagoConQue:      conQue > 0 ? conQue : null,
        cambioADevolver: (conQue > 0 && conQue > total) ? (conQue - total) : null,
        estado:          'cocina',  // efectivo: va directo a cocina
        pagoConfirmado:  false,
        tsPagoSeleccionado: Date.now(),
      });
      showToast('✅ Método de pago guardado — tu pedido va a cocina');
    } catch(e) { showToast('❌ Error al guardar. Intenta de nuevo.'); }
  } else {
    // Pago digital: guardar método y pedir comprobante
    try {
      await update(ref(db, `restaurante/domicilios/${sessionId}`), {
        metodoPago:      metodoPagoId,
        metodoPagoLabel: metodoPagoLabel,
        estado:          'pago_revisando',
        comprobanteImg:  null,
        tsPagoSeleccionado: Date.now(),
      });
      showToast('💳 Ahora sube el comprobante de pago');
    } catch(e) { showToast('❌ Error al guardar. Intenta de nuevo.'); }
  }
};

// ── Cliente sube comprobante ────────────────────────────────────
window.subirComprobante = async function(sessionId) {
  const fileInput = document.getElementById('comprobanteFile');
  const btn       = document.getElementById('btnSubirComprobante');
  if (!fileInput || !fileInput.files[0]) {
    showToast('⚠️ Selecciona primero una imagen del comprobante');
    return;
  }
  const file = fileInput.files[0];
  if (file.size > 3 * 1024 * 1024) {
    showToast('⚠️ La imagen es muy grande. Máximo 3MB.');
    return;
  }
  btn.disabled = true;
  btn.textContent = '⏳ Subiendo comprobante…';
  try {
    const base64 = await new Promise((res, rej) => {
      const r = new FileReader();
      r.onload  = () => res(r.result);
      r.onerror = () => rej(new Error('Error leyendo archivo'));
      r.readAsDataURL(file);
    });
    await update(ref(db, `restaurante/domicilios/${sessionId}`), {
      comprobanteImg:   base64,
      tsComprobante:    Date.now(),
      estado:           'pago_revisando',
    });
    showToast('✅ Comprobante enviado — el restaurante lo está revisando');
  } catch(e) {
    showToast('❌ Error al subir el comprobante. Intenta de nuevo.');
    btn.disabled = false;
    btn.textContent = '📤 Enviar comprobante al restaurante';
  }
};

window.cancelarPedido = async function(sessionId) {
  if (!confirm('¿Seguro que quieres cancelar tu pedido?')) return;
  const btn = document.getElementById('btnCancelar');
  if (btn) { btn.disabled = true; btn.textContent = '⏳ Cancelando…'; }
  try {
    await update(ref(db, `restaurante/domicilios/${sessionId}`), {
      estado: 'cancelado',
      canceladoPorCliente: true,
      tsCancelado: Date.now(),
    });
    localStorage.removeItem(SESSION_KEY);
    sessionActiva = null;
    if (seguimientoUnsub) { seguimientoUnsub(); seguimientoUnsub = null; }
  } catch(e) {
    showToast('❌ Error al cancelar. Intenta de nuevo.');
    if (btn) { btn.disabled = false; btn.textContent = '✕ Cancelar mi pedido'; }
  }
};

window.volverAlMenu = function() {
  if (seguimientoUnsub) { seguimientoUnsub(); seguimientoUnsub = null; }
  localStorage.removeItem(SESSION_KEY);
  sessionActiva = null;
  cart = {};
  actualizarFab();
  showScreen('menu');
};

// ════════════════════════════════════════════════════════════════
init();
</script>
